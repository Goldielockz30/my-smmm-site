backend:
  name: github
  repo: Goldielockz30/my-smmm-site
  branch: main
  auth_type: implicit
  app_id: zom0RPYQzv4LRJ3kj414Aom8jH1ME8OV
  base_url: https://dev-lqu56b6r54md4cln.us.auth0.com
  login: true

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "_pages/index.md"  # This file must exist in your repo
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
