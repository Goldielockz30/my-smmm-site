backend:
  name: github
  repo: Goldielockz30/my-smmm-site
  branch: main
  auth_type: implicit
  app_id: zom0RPYQzv4LRJ3kj414Aom8jH1ME8OV
  base_url: https://dev-lqu56b6r54md4cln.us.auth0.com
  login: true

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.md"  # This file must exist in your repo
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Header Title", name: "header_title", widget: "string" }
          - { label: "Header Subtitle", name: "header_subtitle", widget: "string" }
          - { label: "Services Title", name: "services_title", widget: "string" }
          - { label: "Services", name: "services", widget: "list", allow_add: true }
          - { label: "Why Choose Us Title", name: "why_choose_us_title", widget: "string" }
          - { label: "Why Choose Us Text", name: "why_choose_us_text", widget: "text" }
          - { label: "Contact Title", name: "contact_title", widget: "string" }
          - { label: "Contact Text", name: "contact_text", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Contact Button Text", name: "contact_button_text", widget: "string" }
